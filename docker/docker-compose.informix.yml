version: '3.8'

# =============================================================================
# AMPLITUDE CBS - Informix Database Container
# BSIC Bank - Development & Demo Environment
# =============================================================================

services:
  informix-cbs:
    image: icr.io/informix/informix-developer-database:latest
    container_name: bsic-informix-cbs
    hostname: informix-cbs
    privileged: true
    environment:
      - LICENSE=accept
      - SIZE=small
      - DBNAME=amplitude
      - STORAGE=local
    ports:
      - "9088:9088"    # DRDA port
      - "9089:9089"    # SQLI port
      - "27017:27017"  # REST API
      - "27018:27018"  # Wire listener
    volumes:
      - informix_data:/opt/ibm/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
      # SQL files will be copied manually after container starts (more reliable on Windows)
    networks:
      - bsic-network
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1 FROM systables WHERE tabid=1' | dbaccess sysmaster 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

networks:
  bsic-network:
    driver: bridge

volumes:
  informix_data:
    driver: local
