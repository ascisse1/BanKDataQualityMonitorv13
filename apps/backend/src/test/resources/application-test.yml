spring:
  datasource:
    primary:
      jdbc-url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
      username: sa
      password:
      driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  liquibase:
    enabled: false

  data:
    redis:
      repositories:
        enabled: false

  cache:
    type: none

  # Disable Spring AI for tests
  ai:
    ollama:
      enabled: false

  # Disable OAuth2 for tests - set mock values
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: test-client
            client-secret: test-secret
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: http://localhost:8180/realms/test
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/test

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaApiAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration
      - org.springframework.boot.security.oauth2.client.autoconfigure.OAuth2ClientAutoConfiguration
      - org.springframework.boot.security.oauth2.resourceserver.autoconfigure.OAuth2ResourceServerAutoConfiguration

app:
  jwt:
    secret: test-secret-key-for-testing-purposes-minimum-256-bits-long-enough
    expiration: 86400000

  features:
    ai-detection:
      enabled: false
    workflow-automation: false
    kpi-tracking: false
    informix-integration: false

  faro:
    enabled: false
