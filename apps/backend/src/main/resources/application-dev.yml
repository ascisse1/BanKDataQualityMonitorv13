spring:
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: llama3.1
        options:
          temperature: 0.3

  datasource:
    primary:
      jdbc-url: jdbc:postgresql://localhost:5432/bdqm?currentSchema=public
      username: bdqm
      password: bdqm

    # Informix CBS database (Docker container)
    informix:
      jdbc-url: jdbc:informix-sqli://localhost:9088/bank:INFORMIXSERVER=informix
      username: informix
      password: in4mix
      driver-class-name: com.informix.jdbc.IfxDriver
      hikari:
        pool-name: Informix-CBS
        maximum-pool-size: 5
        minimum-idle: 2
        connection-timeout: 30000
        # Informix-specific properties
        data-source-properties:
          NEWCODESET: UTF8,8859-1,819
          IFX_LOCK_MODE_WAIT: 5


  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  liquibase:
    enabled: true
    drop-first: false
    default-schema: public
    contexts: dev

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true
app:
  jwt:
    secret: bank_data_quality_secret_key_2024_change_in_production
    expiration: 86400000
  max-records: 2000
  sync:
    parallelism: 1   # Informix dev instance doesn't support concurrent access
    batch-retry: 2
  features:
    informix-integration: true
  amplitude-api:
    enabled: false
    base-url: http://localhost:8080/amplitude
    api-key: dev-token
    fallback-jdbc: true
    user-code: BDQM
    channel-code: QUALITE
  faro:
    enabled: true
  scheduling:
    cbs-sync-cron: "*/59 * * * * ?"      # Every 60 seconds (dev only)
    fatca-screening-cron: "0 */1 * * * ?"  # Every minute (dev only)
    archival-cron: "0 */5 * * * ?"         # Every 5 minutes (dev only)
  archival:
    retention-days: 30
  client:
    name: bdqm
    fullName: "Agence de Gestion du Fonds d'Accès Universel"
  keycloak:
    server-url: http://localhost:9083
    realm: bdqm
    client-id: admin-cli
    client-secret: 6c1d4552-e109-4127-afa3-124d55b4e952
    migration:
      enabled: true
      async: true
      delay: 5000 # Délai en ms avant de démarrer les migrations
      retry:
        max-attempts: 3
        delay: 2000 # Délai entre les tentatives en cas d'échec

logging:
  level:
    com.adakalgroup: DEBUG
    org.springframework.security: INFO
    org.springframework.security.oauth2: INFO
    org.springframework.web: INFO
    org.springframework.web.client.RestTemplate: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO

server:
  port: 8086
