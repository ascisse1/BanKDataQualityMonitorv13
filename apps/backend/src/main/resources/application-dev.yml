spring:
  datasource:
    primary:
      jdbc-url: jdbc:postgresql://localhost:5432/bdqm
      username: bdqm
      password: bdqm

    # Informix CBS database (Docker container)
    informix:
      jdbc-url: jdbc:informix-sqli://localhost:9088/bank:INFORMIXSERVER=informix
      username: informix
      password: in4mix
      driver-class-name: com.informix.jdbc.IfxDriver
      hikari:
        pool-name: Informix-CBS
        maximum-pool-size: 5
        minimum-idle: 2
        connection-timeout: 30000
        # Informix-specific properties
        data-source-properties:
          NEWCODESET: UTF8,8859-1,819
          IFX_LOCK_MODE_WAIT: 5


  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  liquibase:
    enabled: true
    drop-first: false
    contexts: dev

app:
  jwt:
    secret: bank_data_quality_secret_key_2024_change_in_production
    expiration: 86400000
  features:
    informix-integration: true
  scheduling:
    cbs-sync-cron: "*/59 * * * * ?"      # Every 60 seconds (dev only)
  client:
    name: bsic-bank
    fullName: "Agence de Gestion du Fonds d'Accès Universel"
  keycloak:
    server-url: http://localhost:9083
    realm: bsic-bank
    client-id: admin-cli
    client-secret: 6c1d4552-e109-4127-afa3-124d55b4e952
    migration:
      enabled: true
      async: true
      delay: 5000 # Délai en ms avant de démarrer les migrations
      retry:
        max-attempts: 3
        delay: 2000 # Délai entre les tentatives en cas d'échec

logging:
  level:
    com.bsic: DEBUG
    org.springframework.security: INFO
    org.springframework.security.oauth2: INFO
    org.springframework.web: INFO
    org.springframework.web.client.RestTemplate: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO

server:
  port: 8086

