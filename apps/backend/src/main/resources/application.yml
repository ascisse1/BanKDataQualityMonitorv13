server:
  port: 8080
  ssl:
    enabled: false
  compression:
    enabled: true
  http2:
    enabled: true
  forward-headers-strategy: framework
spring:
  application:
    name: bdqm-backend
  docker:
    compose:
      enabled: false
      lifecycle-management: start-only
      file: ../../infra/docker/services.yml

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      init:
        pull-model-strategy: when_missing
      chat:
        model: ${OLLAMA_MODEL:llama3.1}
        options:
          temperature: ${OLLAMA_TEMPERATURE:0.3}
          num-predict: ${OLLAMA_MAX_TOKENS:1024}

  datasource:
    primary:
      jdbc-url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bdqm}
      username: ${DB_USER:bdqm}
      password: ${DB_PASSWORD:bdqm}
      driver-class-name: org.postgresql.Driver
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: PostgreSQLPool

    informix:
      jdbc-url: jdbc:informix-sqli://${INFORMIX_HOST:10.3.0.66}:${INFORMIX_PORT:1526}/${INFORMIX_DATABASE:bdmsa}:INFORMIXSERVER=${INFORMIX_SERVER:ol_bdmsa};DELIMIDENT=Y;DB_LOCALE=en_US.utf8;CLIENT_LOCALE=en_US.utf8
      username: ${INFORMIX_USER:bank}
      password: ${INFORMIX_PASSWORD:bank}
      driver-class-name: com.informix.jdbc.IfxDriver
      hikari:
        maximum-pool-size: 10
        minimum-idle: 2
        connection-timeout: 30000
        idle-timeout: 300000
        max-lifetime: 1800000
        pool-name: InformixPool
        connection-test-query: SELECT FIRST 1 1 FROM systables

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master-pg.xml
    default-schema: public

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        globally_quoted_identifiers: false
        hbm2ddl:
          auto: none
        validator:
          apply_to_ddl: false
        check_nullability: false


  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false

  security:
    oauth2:
      # OAuth2 Client - handles login flow and stores tokens server-side (most secure)
      client:
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9083/realms/bdqm}
            user-name-attribute: preferred_username
        registration:
          keycloak:
            client-id: web_app
            client-secret: web_app
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      password: ${REDIS_PASSWORD:}

flowable:
  async-executor-activate: true
  database-schema: workflow
  database-schema-update: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    export:
      enabled: ${TRACING_ENABLED:false}
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4317}
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
    com.adakalgroup: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
  pattern:
    # Include trace_id and span_id for log correlation with distributed tracing
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}] --- [%15.15t] %-40.40logger{39} : %m%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}] --- [%15.15t] %-40.40logger{39} : %m%n"
  file:
    name: logs/application.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30

keycloak:
  realm: ${KEYCLOAK_REALM:bdqm}
  auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:9083}
  resource: ${KEYCLOAK_CLIENT_ID:admin-cli}
  agency-code-claim: agency_code
  # Admin client for user management (requires service account with realm-management roles)
  admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
  admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:6c1d4552-e109-4127-afa3-124d55b4e952}

app:
  keycloak:
    server-url: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:9083}
    realm: ${KEYCLOAK_REALM:bdqm}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:6c1d4552-e109-4127-afa3-124d55b4e952}
  jwt:
    secret: ${JWT_SECRET:bdqm-data-quality-secret-key-change-in-production-minimum-256-bits}
    expiration: 86400000
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,http://localhost:9083}
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
    # Explicit headers required when allow-credentials is true (wildcard "*" not allowed per CORS spec)
    allowed-headers: Authorization,Content-Type,X-XSRF-TOKEN,X-Requested-With,Accept,Origin,Cache-Control,Pragma
    allow-credentials: true
  security:
    tls:
      version: TLSv1.3
    encryption:
      algorithm: AES-256
  scheduling:
    kpi-calculation-cron: "0 0 1 * * ?"
    sla-check-cron: "0 */15 * * * ?"
    cbs-sync-cron: "0 0 2 * * ?"          # Daily at 2:00 AM (all enabled CBS tables)
    reconciliation-cron: "${RECONCILIATION_CRON:0 0 3 * * ?}"  # Daily at 3:00 AM
    reconciliation-max-tasks: ${RECONCILIATION_MAX_TASKS:100}
    fatca-screening-cron: "${FATCA_SCREENING_CRON:0 30 3 * * ?}"  # Daily at 3:30 AM
  fatca:
    giin: ${FATCA_GIIN:XXXXXX.XXXXX.XX.XXX}
    reporting-country: ${FATCA_COUNTRY:XX}
    fi-name: ${FATCA_FI_NAME:Your Bank Name}
    fi-address: ${FATCA_FI_ADDRESS:Your Bank Address}
    filer-category: ${FATCA_FILER_CATEGORY:FATCA601}
    screening-enabled: ${FATCA_SCREENING_ENABLED:true}
  max-records: ${APP_MAX_RECORDS:0}
  sync:
    parallelism: ${SYNC_PARALLELISM:1}
    batch-retry: ${SYNC_BATCH_RETRY:2}
  features:
    workflow-automation: ${FEATURE_WORKFLOW:true}
    kpi-tracking: ${FEATURE_KPI:true}
    informix-integration: ${FEATURE_INFORMIX:false}
    batch-reconciliation: ${FEATURE_BATCH_RECONCILIATION:false}
  amplitude-api:
    enabled: ${CBS_API_ENABLED:false}
    base-url: ${CBS_API_URL:http://localhost:8080/amplitude}
    api-key: ${CBS_API_KEY:}
    timeout: ${CBS_API_TIMEOUT:30000}
    version: ${CBS_API_VERSION:v1}
    fallback-jdbc: ${CBS_API_FALLBACK_JDBC:true}
    user-code: ${CBS_API_USER_CODE:BDQM}
    channel-code: ${CBS_API_CHANNEL_CODE:QUALITE}
  faro:
    enabled: ${FARO_ENABLED:false}
