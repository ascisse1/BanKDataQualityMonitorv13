server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Spring Boot application logs
  - job_name: spring-boot
    static_configs:
      - targets:
          - localhost
        labels:
          job: bsic-backend
          app: bsic-data-quality
          __path__: /var/log/bsic/*.log

    pipeline_stages:
      # Parse Spring Boot log format
      - multiline:
          firstline: '^\d{4}-\d{2}-\d{2}'
          max_wait_time: 3s

      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}.\d{3})\s+(?P<level>\w+)\s+(?P<pid>\d+)\s+---\s+\[(?P<thread>[^\]]+)\]\s+(?P<logger>[^\s]+)\s+:\s+(?P<message>.*)$'

      - labels:
          level:
          logger:
          thread:

      - timestamp:
          source: timestamp
          format: '2006-01-02 15:04:05.000'

      # Add severity label based on log level
      - template:
          source: level
          template: '{{ ToLower .Value }}'

      - labels:
          severity: level

  # Docker container logs
  - job_name: containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'logstream'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'

  # System logs (if mounted)
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/syslog

  # Frontend logs (from backend monitoring endpoint)
  - job_name: frontend
    static_configs:
      - targets:
          - localhost
        labels:
          job: bsic-frontend
          app: bsic-data-quality
          __path__: /var/log/bsic/frontend*.log
