apiVersion: 1

providers:
  - name: 'BSIC Dashboards'
    orgId: 1
    folder: 'BSIC Data Quality'
    folderUid: 'bsic-folder'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
