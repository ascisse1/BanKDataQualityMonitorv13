name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '18.x'
  JAVA_VERSION: '17'
  APP_NAME: 'BankDataQualityMonitor'

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - run: rm -f package-lock.json && npm install
      - run: npm test --if-present
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/frontend/dist/
          retention-days: 7

  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - run: mvn clean package -DskipTests
      - run: mvn test

      - uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: apps/backend/target/*.jar
          retention-days: 7

  deploy:
    needs: [build-frontend, build-backend]
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./frontend-dist

      - uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: ./backend-jar

      - name: Deploy application
        shell: powershell
        run: |
          $AppPath = "C:\apps\${{ env.APP_NAME }}"
          New-Item -ItemType Directory -Path "$AppPath\static" -Force

          # Deploy frontend static files
          Copy-Item -Path ".\frontend-dist\*" -Destination "$AppPath\static" -Recurse -Force

          # Deploy backend JAR
          Copy-Item -Path ".\backend-jar\*.jar" -Destination "$AppPath\app.jar" -Force

          Write-Host "Deployment complete"

      - name: Verify deployment
        shell: powershell
        run: |
          $AppPath = "C:\apps\${{ env.APP_NAME }}"
          if (Test-Path "$AppPath\app.jar") {
            Write-Host "Backend JAR deployed"
          } else {
            Write-Host "Backend JAR missing"
            exit 1
          }
          if (Test-Path "$AppPath\static\index.html") {
            Write-Host "Frontend deployed"
          } else {
            Write-Host "Frontend files missing"
            exit 1
          }
